<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据质量治理｜项目封面</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: rgba(255, 255, 255, 0.88);
            --line: rgba(122, 143, 182, 0.16);
            --text: #182742;
            --muted: #6f819d;
            --soft: #9aa8bd;
            --accent: #4775ff;
            --shadow: 0 18px 48px rgba(47, 74, 124, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 84% 14%, rgba(89, 134, 255, 0.1), transparent 18%),
                linear-gradient(180deg, #fbfcff 0%, #f3f6fb 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: var(--text);
        }

        .page {
            width: min(1600px, calc(100vw - 48px));
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(248,250,255,0.96) 72%, rgba(241,246,255,0.98) 100%);
            box-shadow: 0 22px 72px rgba(46, 73, 122, 0.08);
        }

        .page::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.88) 48%, rgba(255,255,255,0.7) 100%);
            pointer-events: none;
        }

        .page::after {
            content: "";
            position: absolute;
            inset: 40px;
            border: 1px solid rgba(126, 146, 184, 0.08);
            border-radius: 22px;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            padding: 72px 80px 56px;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--soft);
            font-size: 15px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .chapter {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--muted);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.12em;
        }

        .chapter::before {
            content: "01";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(71, 117, 255, 0.08);
            color: var(--accent);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.06em;
        }

        .brand {
            color: rgba(71, 117, 255, 0.78);
            font-weight: 700;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(420px, 0.95fr);
            align-items: center;
            gap: 44px;
            min-height: 0;
        }

        .copy {
            max-width: 760px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            color: var(--muted);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.12em;
        }

        .eyebrow::before {
            content: "";
            width: 36px;
            height: 2px;
            border-radius: 999px;
            background: rgba(24, 39, 66, 0.68);
        }

        .title {
            margin-top: 26px;
            font-size: clamp(72px, 5.5vw, 110px);
            line-height: 0.98;
            letter-spacing: -0.05em;
            font-weight: 800;
        }

        .subtitle {
            margin-top: 24px;
            max-width: 700px;
            font-size: clamp(28px, 2vw, 38px);
            line-height: 1.55;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .meta-row {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.72);
            color: #6a7b97;
            font-size: 16px;
            font-weight: 600;
        }

        .pill.accent {
            color: var(--accent);
            border-color: rgba(71, 117, 255, 0.16);
            background: rgba(71, 117, 255, 0.08);
        }

        .visual-wrap {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glow {
            position: absolute;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(85, 129, 255, 0.12) 0%, rgba(85, 129, 255, 0.04) 45%, rgba(85, 129, 255, 0) 72%);
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .mockup {
            position: relative;
            width: min(100%, 660px);
            padding: 18px;
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(255,255,255,0.86) 0%, rgba(246,250,255,0.96) 100%);
            border: 1px solid rgba(128, 150, 191, 0.14);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .mockup::before {
            content: "";
            position: absolute;
            inset: 12px;
            border-radius: 22px;
            border: 1px solid rgba(128, 150, 191, 0.08);
            pointer-events: none;
        }

        .window {
            overflow: hidden;
            border-radius: 22px;
            background: #f9fbff;
            border: 1px solid rgba(126, 146, 184, 0.12);
        }

        .window-top {
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(245,248,255,0.9);
            border-bottom: 1px solid rgba(126, 146, 184, 0.1);
        }

        .window-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #576b8f;
            font-size: 15px;
            font-weight: 700;
        }

        .window-brand::before {
            content: "";
            width: 16px;
            height: 16px;
            border-radius: 5px;
            background: linear-gradient(180deg, #48d1c7 0%, #4978ff 100%);
        }

        .window-actions {
            display: flex;
            gap: 8px;
        }

        .window-actions span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(126, 146, 184, 0.26);
        }

        .window-body {
            display: grid;
            grid-template-columns: 92px 180px 1fr;
            min-height: 360px;
        }

        .rail {
            padding: 18px 12px;
            background: linear-gradient(180deg, #f7faff 0%, #f3f7ff 100%);
            border-right: 1px solid rgba(126, 146, 184, 0.1);
        }

        .rail-item {
            height: 38px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: rgba(123, 145, 184, 0.08);
        }

        .rail-item.active {
            background: rgba(71, 117, 255, 0.12);
            position: relative;
        }

        .rail-item.active::before {
            content: "";
            position: absolute;
            left: 8px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 999px;
            background: var(--accent);
        }

        .tree {
            padding: 18px 16px;
            border-right: 1px solid rgba(126, 146, 184, 0.1);
            background: rgba(255,255,255,0.84);
        }

        .search {
            height: 38px;
            border-radius: 12px;
            border: 1px solid rgba(126, 146, 184, 0.12);
            background: #fbfdff;
        }

        .node {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 4px;
            background: linear-gradient(180deg, #ffd97d 0%, #ffba4d 100%);
        }

        .node span {
            display: block;
            height: 10px;
            border-radius: 999px;
            background: rgba(111, 129, 157, 0.14);
        }

        .node .w1 { width: 80px; }
        .node .w2 { width: 114px; }
        .node .w3 { width: 64px; }

        .canvas {
            padding: 18px;
            display: grid;
            grid-template-rows: 86px 84px 1fr;
            gap: 14px;
        }

        .hero-card {
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(232,239,255,0.9) 0%, rgba(243,247,255,0.9) 100%);
            border: 1px solid rgba(126, 146, 184, 0.12);
            padding: 16px 18px;
        }

        .line {
            height: 10px;
            border-radius: 999px;
            background: rgba(91, 112, 149, 0.14);
        }

        .line + .line {
            margin-top: 10px;
        }

        .line.short { width: 120px; }
        .line.mid { width: 220px; }
        .line.long { width: 320px; }

        .workflow {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px;
        }

        .step {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .step::before {
            content: "";
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(87, 193, 178, 0.16);
            box-shadow: inset 0 0 0 5px rgba(87, 193, 178, 0.12);
            flex-shrink: 0;
        }

        .step span {
            display: block;
            height: 10px;
            flex: 1;
            border-radius: 999px;
            background: rgba(101, 122, 158, 0.14);
        }

        .step-line {
            width: 20px;
            height: 2px;
            background: rgba(126, 146, 184, 0.16);
            flex-shrink: 0;
        }

        .table {
            border-radius: 18px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(126, 146, 184, 0.1);
            padding: 16px;
        }

        .thead,
        .trow {
            display: grid;
            grid-template-columns: 1.1fr 1.3fr 0.9fr 0.8fr;
            gap: 10px;
        }

        .thead {
            margin-bottom: 12px;
        }

        .trow + .trow {
            margin-top: 10px;
        }

        .cell {
            height: 10px;
            border-radius: 999px;
            background: rgba(112, 130, 157, 0.14);
        }

        .thead .cell {
            background: rgba(112, 130, 157, 0.1);
        }

        .bottom {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding-top: 28px;
            border-top: 1px solid var(--line);
        }

        .info {
            min-width: 0;
        }

        .info-label {
            font-size: 12px;
            color: rgba(71, 117, 255, 0.82);
            letter-spacing: 0.16em;
            font-weight: 700;
        }

        .info-value {
            margin-top: 10px;
            font-size: 24px;
            line-height: 1.4;
            color: var(--text);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .info-desc {
            margin-top: 10px;
            font-size: 16px;
            line-height: 1.7;
            color: var(--muted);
        }

        @media (max-width: 1380px) {
            .content {
                padding: 56px 56px 44px;
            }

            .hero {
                grid-template-columns: 1fr;
                gap: 28px;
                align-items: start;
            }

            .visual-wrap {
                justify-content: flex-start;
            }

            .mockup {
                width: min(100%, 760px);
            }

            .bottom {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="content">
            <div class="topbar">
                <div class="chapter">项目章节封面</div>
                <div class="brand">DATA QUALITY GOVERNANCE</div>
            </div>

            <section class="hero">
                <div class="copy">
                    <div class="eyebrow">企业级数据中台｜交互设计</div>
                    <h1 class="title">数据质量治理</h1>
                    <p class="subtitle">
                        从异常发现到闭环流转，重构企业级数据治理体验。
                    </p>
                    <div class="meta-row">
                        <span class="pill accent">0→1 设计实践</span>
                        <span class="pill">企业级系统</span>
                        <span class="pill">全链路治理</span>
                    </div>
                </div>

                <div class="visual-wrap">
                    <div class="glow"></div>
                    <div class="mockup">
                        <div class="window">
                            <div class="window-top">
                                <div class="window-brand">FineDataLink</div>
                                <div class="window-actions">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                            </div>
                            <div class="window-body">
                                <div class="rail">
                                    <div class="rail-item"></div>
                                    <div class="rail-item"></div>
                                    <div class="rail-item active"></div>
                                    <div class="rail-item"></div>
                                </div>
                                <div class="tree">
                                    <div class="search"></div>
                                    <div class="node"><span class="w2"></span></div>
                                    <div class="node"><span class="w1"></span></div>
                                    <div class="node"><span class="w3"></span></div>
                                    <div class="node"><span class="w2"></span></div>
                                    <div class="node"><span class="w1"></span></div>
                                </div>
                                <div class="canvas">
                                    <div class="hero-card">
                                        <div class="line short"></div>
                                        <div class="line long"></div>
                                        <div class="line mid"></div>
                                    </div>
                                    <div class="workflow">
                                        <div class="step"><span></span></div>
                                        <div class="step-line"></div>
                                        <div class="step"><span></span></div>
                                        <div class="step-line"></div>
                                        <div class="step"><span></span></div>
                                        <div class="step-line"></div>
                                        <div class="step"><span></span></div>
                                    </div>
                                    <div class="table">
                                        <div class="thead">
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                        </div>
                                        <div class="trow">
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                        </div>
                                        <div class="trow">
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                        </div>
                                        <div class="trow">
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                        </div>
                                        <div class="trow">
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                            <div class="cell"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bottom">
                <div class="info">
                    <div class="info-label">PROJECT TYPE</div>
                    <div class="info-value">企业级数据中台</div>
                    <div class="info-desc">以数据治理为核心的后台系统设计。</div>
                </div>
                <div class="info">
                    <div class="info-label">MY ROLE</div>
                    <div class="info-value">交互设计</div>
                    <div class="info-desc">负责结构梳理、关键流程与核心页面方案。</div>
                </div>
                <div class="info">
                    <div class="info-label">DESIGN SCOPE</div>
                    <div class="info-value">规则配置 / 检测执行</div>
                    <div class="info-desc">覆盖问题清单、定位分析与闭环流转。</div>
                </div>
                <div class="info">
                    <div class="info-label">PROJECT GOAL</div>
                    <div class="info-value">提升治理效率</div>
                    <div class="info-desc">让异常发现、处理与协作路径更清晰可控。</div>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
