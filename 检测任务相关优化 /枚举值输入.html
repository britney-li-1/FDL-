<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; padding: 40px; }
  
  .tag-input-wrapper { width: 500px; font-size: 14px; }

  /* 输入框主区域 */
  .tag-container {
    display: flex; flex-wrap: wrap; align-items: center; border: 1px solid #d1d5db;
    background: #fff; padding: 6px; border-radius: 8px; min-height: 48px;
    transition: all 0.2s; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .tag-container:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }

  /* 标签的基础样式 */
  .tag {
    background-color: #f1f5f9; color: #334155; border: 1px solid #e2e8f0;
    padding: 2px 8px; border-radius: 6px; margin: 4px; display: flex; align-items: center;
    transition: background 0.2s;
  }
  
  /* 标签文字：支持点击编辑的视觉暗示 */
  .tag-text {
    cursor: pointer;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    line-height: 20px;
  }
  .tag-text:hover { border-color: #64748b; color: #0f172a; } /* Hover时提示可点击 */

  /* 内联编辑使用的输入框（默认隐藏） */
  .tag-edit-input {
    display: none; background: #fff; border: 1px solid #93c5fd; border-radius: 4px;
    outline: none; font-size: 14px; color: #1e293b; padding: 0 4px; margin: 0 -4px;
    box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
  }

  /* 删除按钮 */
  .tag .close { margin-left: 6px; color: #94a3b8; cursor: pointer; font-size: 16px; transition: color 0.1s; }
  .tag .close:hover { color: #ef4444; }

  /* 主输入区域 */
  .input-area { display: flex; flex: 1; min-width: 150px; align-items: center; position: relative; }
  .tag-input { border: none; outline: none; width: 100%; padding: 4px; font-size: 14px; background: transparent; color: #1f2937; }

  /* Enter 徽标和底部文案同上... */
  .enter-badge {
    position: absolute; right: 8px; background: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0;
    padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; transition: all 0.2s; pointer-events: none;
  }
  .tag-container.is-typing .enter-badge {
    background: #eff6ff; color: #2563eb; border-color: #93c5fd; font-weight: bold; transform: translateY(-1px);
  }
  .dynamic-helper { font-size: 12px; color: #6b7280; margin-top: 8px; min-height: 18px; }
  .dynamic-helper span { color: #2563eb; font-weight: 500; }
</style>
</head>
<body>

  <div class="tag-input-wrapper">
    <label style="display: block; font-weight: 500; margin-bottom: 8px; color: #374151;">
      支持“内联修改”与“退格回退”的高级多值输入
    </label>

    <div class="tag-container" id="tag-container">
      <div class="input-area">
        <input type="text" class="tag-input" id="tag-input" placeholder="输入内容后按 Enter 键...">
        <div class="enter-badge" id="enter-badge">↵ Enter</div>
      </div>
    </div>

    <div class="dynamic-helper" id="helper-text">
       提示：点击已生成的标签即可修改，或使用退格键 (Backspace) 快速回退。
    </div>
  </div>

  <script>
    const input = document.getElementById('tag-input');
    const container = document.getElementById('tag-container');
    const helperText = document.getElementById('helper-text');
    const defaultHelperHtml = '提示：点击已生成的标签即可修改，或使用退格键 (Backspace) 快速回退。';

    // 初始化两个示例标签
    createTag('苹果');
    createTag('价格1,2');

    // ========== 1. 主输入框逻辑 ========== //

    input.addEventListener('input', function() {
      const val = this.value.trim();
      if (val.length > 0) {
        container.classList.add('is-typing');
        helperText.innerHTML = `按 <span>回车键 (Enter)</span> 添加`;
      } else {
        container.classList.remove('is-typing');
        helperText.innerHTML = defaultHelperHtml;
      }
    });

    input.addEventListener('keydown', function(e) {
      // 回车生成标签
      if (e.key === 'Enter') {
        e.preventDefault();
        const text = this.value.trim();
        if (text !== '') {
          createTag(text);
          this.value = '';
          container.classList.remove('is-typing');
          helperText.innerHTML = defaultHelperHtml;
        }
      }
      // ★ 退格键（Backspace）回退修改机制 ★
      // 当输入框为空，且按下了退格键，则把最后一个标签“吸”回来重新编辑
      else if (e.key === 'Backspace' && this.value === '') {
        const tags = container.querySelectorAll('.tag');
        if (tags.length > 0) {
          e.preventDefault(); // 阻止浏览器默认行为
          const lastTag = tags[tags.length - 1];
          const text = lastTag.querySelector('.tag-text').textContent;
          this.value = text;              // 将文字放回主输入框
          lastTag.remove();               // 移除最后一个标签
          container.classList.add('is-typing'); // 点亮状态
          helperText.innerHTML = `正在重新编辑上一个项...`;
        }
      }
    });

    // 失去焦点防呆机制（为了防止和点击标签编辑冲突，加100ms延迟）
    input.addEventListener('blur', function() {
      setTimeout(() => {
        const text = this.value.trim();
        if (text !== '') {
          createTag(text);
          this.value = '';
          container.classList.remove('is-typing');
          helperText.innerHTML = defaultHelperHtml;
        }
      }, 100);
    });

    // ========== 2. 核心：动态创建支持修改的标签 ========== //

    function createTag(text) {
      const tag = document.createElement('div');
      tag.className = 'tag';

      // 文本显示区
      const span = document.createElement('span');
      span.className = 'tag-text';
      span.textContent = text; // testContent天生防XSS
      span.title = '点击修改';

      // 内联编辑框
      const editInput = document.createElement('input');
      editInput.type = 'text';
      editInput.className = 'tag-edit-input';
      editInput.value = text;
      
      // 删除按钮
      const closeBtn = document.createElement('span');
      closeBtn.className = 'close';
      closeBtn.innerHTML = '×';

      // -------------- ★ 标签修改逻辑 ★ --------------

      // 点击文字：进入编辑模式
      span.addEventListener('click', (e) => {
        e.stopPropagation(); // 阻止冒泡触发外部 blur
        // 视觉切换
        span.style.display = 'none';
        closeBtn.style.display = 'none';
        editInput.style.display = 'inline-block';
        
        // 动态宽度计算，让输入框贴合文字长度
        editInput.style.width = Math.max(3, editInput.value.length) + 'ch';
        
        editInput.focus();
        // 光标自动移到文字最后
        editInput.selectionStart = editInput.selectionEnd = editInput.value.length; 
      });

      // 输入框动态伸缩（根据打字长度）
      editInput.addEventListener('input', function() {
        this.style.width = Math.max(3, this.value.length) + 'ch';
      });

      // 保存修改的功能函数
      const finishEdit = () => {
        const newVal = editInput.value.trim();
        if (newVal === '') {
          // 如果用户把文字全删光了，视同直接删除该标签
          tag.remove(); 
        } else {
          // 否则更新文字内容并恢复正常状态
          span.textContent = newVal;
          editInput.value = newVal; // 同步数据
          span.style.display = 'inline-block';
          closeBtn.style.display = 'inline-block';
          editInput.style.display = 'none';
        }
      };

      // 失去焦点时保存
      editInput.addEventListener('blur', finishEdit);

      // 敲击回车时保存
      editInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          editInput.blur(); // 手动失去焦点触发 finishEdit
        }
      });

      // 删除按钮逻辑
      closeBtn.addEventListener('click', () => tag.remove());

      // 组装并插入 DOM
      tag.appendChild(span);
      tag.appendChild(editInput);
      tag.appendChild(closeBtn);
      container.insertBefore(tag, document.querySelector('.input-area'));
    }
  </script>
</body>
</html>
