<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据连接管理 - 更多设计方案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: #333; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 3px; }
        .tree-indent-1 { padding-left: 1.5rem; }
        .tree-indent-2 { padding-left: 3rem; }
        
        /* 方案4：环形图的纯CSS实现 */
        .donut-chart {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(#3b82f6 76%, #f3f4f6 0);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .donut-inner {
            width: 65px;
            height: 65px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-white h-screen flex overflow-hidden">

    <!-- 左侧侧边栏 (保持一致) -->
    <div class="w-[280px] flex-shrink-0 border-r border-gray-200 flex flex-col h-full bg-white select-none z-10">
        <div class="p-4 pb-2">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2 text-gray-800 font-bold text-lg">
                    <span>数据连接管理</span>
                </div>
                <button class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-3 py-1.5 rounded shadow flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg> 新建
                </button>
            </div>
            <div class="relative">
                <input type="text" placeholder="搜索连接名称/文件夹" class="w-full border border-gray-300 rounded px-3 py-2 pl-9 text-sm focus:outline-none focus:border-blue-500 placeholder-gray-400">
                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto text-sm text-gray-700">
            <div class="flex items-center px-4 py-2 bg-gray-100 font-medium">
                <svg class="w-4 h-4 text-blue-500 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm14 1H4v8h12V6z"></path></svg>
                <span>所有数据连接</span>
            </div>
            <!-- 省略部分树形结构，保持代码简洁，重点展示右侧 -->
        </div>
    </div>

    <!-- 右侧主内容区 -->
    <div class="flex-1 overflow-y-auto w-full bg-white relative">
        <div class="p-8 max-w-6xl mx-auto">
             <!-- 头部信息 (简化展示) -->
             <div class="flex items-start justify-between mb-10 pb-6 border-b border-gray-100">
                <div class="flex gap-5">
                    <div class="w-14 h-14 bg-blue-50 rounded text-blue-600 flex items-center justify-center">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
                    </div>
                    <div>
                        <div class="text-xs text-gray-500 mb-1">美团 / 文件夹3</div>
                        <h1 class="text-2xl font-bold text-gray-900">数据连接名称1</h1>
                    </div>
                </div>
            </div>

            <div class="space-y-16">

                <!-- ============================ -->
                <!-- 方案四：环形图表可视化式 -->
                <!-- ============================ -->
                <div class="relative">
                    <div class="absolute -top-6 left-0 bg-indigo-50 text-indigo-800 text-xs px-2 py-0.5 rounded font-mono">方案四：环形图表可视化式</div>
                    
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-gray-800">同步点数概览</h3>
                        <button class="text-sm text-blue-600 hover:text-blue-800 hover:underline">查看历史记录 &rarr;</button>
                    </div>

                    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
                        
                        <!-- Col 1: Current Connection -->
                        <div class="col-span-1 md:col-span-2 grid grid-cols-2 gap-4 border-r border-gray-100 pr-8">
                            <div>
                                <div class="text-gray-500 text-xs mb-2 flex items-center gap-1">
                                    <span class="w-2 h-2 rounded-full bg-gray-300"></span> 上月消耗
                                </div>
                                <div class="text-2xl font-bold text-gray-800 font-mono">1,245</div>
                                <div class="text-xs text-green-600 mt-1 flex items-center">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                                    同比 -5%
                                </div>
                            </div>
                            <div>
                                <div class="text-gray-500 text-xs mb-2 flex items-center gap-1">
                                    <span class="w-2 h-2 rounded-full bg-blue-500"></span> 本月消耗
                                </div>
                                <div class="text-2xl font-bold text-blue-600 font-mono">892</div>
                                <div class="text-xs text-gray-400 mt-1">预计月底约 1,300</div>
                            </div>
                        </div>

                        <!-- Col 2: Donut Chart & Action -->
                        <div class="col-span-1 flex items-center gap-6">
                            <!-- Pure CSS Donut Chart -->
                            <div class="donut-chart shrink-0" title="已使用 76%">
                                <div class="donut-inner">
                                    <span class="text-xs font-bold text-blue-600">76%</span>
                                </div>
                            </div>
                            
                            <div class="flex-1">
                                <div class="text-xs text-gray-500 mb-0.5">剩余点数</div>
                                <div class="text-xl font-bold text-gray-900 mb-2">24,000</div>
                                <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs py-1.5 rounded transition-colors shadow-sm">
                                    购买点数
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ============================ -->
                <!-- 方案五：极简网格清单式 -->
                <!-- ============================ -->
                <div class="relative">
                    <div class="absolute -top-6 left-0 bg-indigo-50 text-indigo-800 text-xs px-2 py-0.5 rounded font-mono">方案五：极简网格清单式 (B端严谨风)</div>

                    <div class="border border-gray-300 rounded-sm bg-white">
                        <!-- Header -->
                        <div class="bg-gray-50 border-b border-gray-300 px-4 py-3 flex justify-between items-center">
                            <h3 class="font-bold text-sm text-gray-800">同步点数统计</h3>
                            <button class="flex items-center gap-1 text-xs font-medium text-gray-700 hover:text-blue-600 border border-gray-300 bg-white hover:border-blue-400 px-3 py-1 rounded transition-all">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                购买点数包
                            </button>
                        </div>
                        
                        <!-- Grid Content -->
                        <div class="grid grid-cols-1 md:grid-cols-4 divide-y md:divide-y-0 md:divide-x divide-gray-200">
                            <!-- Item 1 -->
                            <div class="p-4">
                                <span class="block text-xs text-gray-500 mb-1">上月消耗 (当前连接)</span>
                                <span class="block text-lg font-medium text-gray-900">1,245</span>
                            </div>
                            <!-- Item 2 -->
                            <div class="p-4">
                                <span class="block text-xs text-gray-500 mb-1">本月消耗 (当前连接)</span>
                                <span class="block text-lg font-medium text-gray-900">892</span>
                            </div>
                             <!-- Item 3: Separator for visual hierarchy -->
                             <div class="p-4 bg-gray-50/50">
                                <span class="block text-xs text-gray-500 mb-1">账户已用总额</span>
                                <div class="flex items-baseline gap-2">
                                    <span class="block text-lg font-medium text-gray-900">76,000</span>
                                    <span class="text-xs text-gray-400">/ 100,000</span>
                                </div>
                                <div class="w-full bg-gray-200 h-1 mt-2 rounded-full overflow-hidden">
                                    <div class="bg-gray-400 h-1" style="width: 76%"></div>
                                </div>
                            </div>
                             <!-- Item 4: Highlight -->
                             <div class="p-4 bg-orange-50/30">
                                <span class="block text-xs text-orange-600 mb-1 font-bold">账户剩余可用</span>
                                <span class="block text-lg font-bold text-orange-600">24,000</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ============================ -->
                <!-- 方案六：通栏状态条式 -->
                <!-- ============================ -->
                <div class="relative">
                    <div class="absolute -top-6 left-0 bg-indigo-50 text-indigo-800 text-xs px-2 py-0.5 rounded font-mono">方案六：通栏状态条式 (强调剩余预警)</div>

                    <!-- Main Container -->
                    <div class="bg-slate-800 rounded-lg p-1 shadow-md text-white flex flex-col md:flex-row items-center">
                        
                        <!-- Left: Usage Data (Dark Background) -->
                        <div class="flex-1 flex items-center justify-around w-full py-4 px-6 gap-6">
                            <div class="flex flex-col items-center md:items-start">
                                <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-1">Last Month</div>
                                <div class="text-xl font-bold font-mono">1,245</div>
                            </div>
                            <div class="w-px h-8 bg-slate-600 hidden md:block"></div>
                            <div class="flex flex-col items-center md:items-start">
                                <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-1">This Month</div>
                                <div class="text-xl font-bold font-mono text-blue-300">892</div>
                            </div>
                             <div class="w-px h-8 bg-slate-600 hidden md:block"></div>
                             <div class="flex flex-col justify-center w-32">
                                <div class="flex justify-between text-[10px] text-slate-400 mb-1">
                                    <span>Used</span>
                                    <span>76%</span>
                                </div>
                                <div class="w-full bg-slate-600 rounded-full h-1.5">
                                    <div class="bg-blue-500 h-full rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]" style="width: 76%"></div>
                                </div>
                             </div>
                        </div>

                        <!-- Right: Action Area (High Contrast) -->
                        <div class="bg-white rounded w-full md:w-auto p-4 flex items-center justify-between md:justify-start gap-6 self-stretch">
                            <div>
                                <div class="text-xs text-gray-500 font-medium">账户剩余点数</div>
                                <div class="text-xl font-extrabold text-gray-900 leading-none mt-1">24,000</div>
                            </div>
                            <button class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2.5 rounded transition-transform active:scale-95">
                                购买
                            </button>
                        </div>

                    </div>
                </div>

                <div class="h-20"></div>

            </div>
        </div>
    </div>
</body>
</html>
