<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预览枚举值 - B端卡片面板风</title>
<style>
  :root {
    --primary-color: #1677ff;
    --text-main: #1d2129;
    --text-regular: #4e5969;
    --text-light: #86909c;
    --bg-modal: #ffffff;
    
    /* 根据你的截图提取的颜色 */
    --panel-header-bg: #f7f8fa; /* 面板头部的浅灰背景 */
    --panel-border: #e5e6eb;    /* 面板与卡片的边框灰 */
    --alert-bg: #e6f4ff;
    --alert-border: #bae0ff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: #e0e0e0; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .modal-wrapper {
    width: 680px;
    background: var(--bg-modal);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--panel-border);
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
    margin: 0;
  }

  .close-btn {
    cursor: pointer;
    font-size: 20px;
    color: var(--text-light);
    line-height: 1;
  }
  .close-btn:hover { color: var(--text-main); }

  .modal-body {
    padding: 20px 24px 28px 24px;
    display: flex;
    flex-direction: column;
  }

  /* 提示条更紧凑 */
  .info-alert {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background-color: var(--alert-bg);
    border: 1px solid var(--alert-border);
    border-radius: 4px;
    color: var(--text-regular);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .info-icon {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 14px;
    height: 14px;
    background: var(--primary-color);
    color: #fff;
    border-radius: 50%;
    font-size: 10px;
    font-weight: bold;
    font-style: normal;
  }

  /* ========================================= */
  /* 🌟 “稳如泰山” 的数据面板构架 (Panel) */
  /* ========================================= */
  .data-panel {
    border: 1px solid var(--panel-border);
    border-radius: 4px; /* 使用稍硬朗的 4px 圆角呼应B端表单 */
    display: flex;
    flex-direction: column;
    overflow: hidden; /* 切除直角 */
  }

  /* 面板的盖子 (Header) - 完美安放你的孤魂字段名 */
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: var(--panel-header-bg);
    padding: 10px 16px;
    border-bottom: 1px solid var(--panel-border);
  }

  /* 完美复刻你截图中的 T Icon 样式 */
  .field-title {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .type-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: inherit;
    font-weight: bold;
    width: 20px;
    height: 20px;
    border-radius: 2px; /* 方形图标底 */
    /* 蓝色系的字图标，可以根据你们规范自行调换 */
    color: var(--primary-color); 
    background-color: transparent; 
  }

  .field-name {
    font-size: 14px;
    color: var(--text-main);
    font-weight: 500;
  }

  /* 统计数字（低调靠右） */
  .panel-meta {
    font-size: 13px;
    color: var(--text-light);
  }

  /* 面板的肚子 (Body) - 盛放所有的枚举值标签 */
  .panel-body {
    height: 280px;
    overflow-y: auto;
    padding: 16px;
    background-color: #ffffff; /* 纯白底色，与头部浅灰形成层次 */
    
    /* 流式标签堆叠 */
    display: flex;
    flex-wrap: wrap; 
    gap: 10px 8px; /* 上下左右间距 */
    align-content: flex-start; 
  }

  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }

  /* 🌟 1:1 复刻你截图里的白底灰边框卡片 */
  .tag-item {
    background-color: #ffffff;
    border: 1px solid var(--panel-border);
    border-radius: 2px; /* 改为硬朗的边缘 */
    padding: 4px 10px;
    font-size: 13px;
    color: var(--text-main);
    display: inline-flex;
    align-items: center;
    word-break: break-all;
    max-width: 100%;
    transition: all 0.2s;
  }

  .tag-item:hover {
    border-color: var(--primary-color);
  }

  /* 用虚线处理空字符和Null，一眼望去不突兀又有区分度 */
  .tag-item.empty-value {
    color: var(--text-light);
    border: 1px dashed #d9d9d9;
    background-color: #fafafa;
    font-style: auto;
  }
</style>
</head>
<body>

<div class="modal-wrapper">
  <!-- 头部 -->
  <div class="modal-header">
    <h3 class="modal-title">预览枚举值</h3>
    <span class="close-btn">&times;</span>
  </div>

  <div class="modal-body">
    <!-- 提示条 -->
    <div class="info-alert">
      <i class="info-icon">i</i>
      系统已提取该参考字段的去重值，作为合法的枚举范围
    </div>

    <!-- 🌟 “面板盖子+无底洞卡片容器” 架构 -->
    <div class="data-panel">
      
      <!-- Panel Header：用带微量底色的横条，完美承载字段名 -->
      <div class="panel-header">
        <div class="field-title">
          <span class="type-icon" style="color:#1677ff; background:#e6f4ff">T</span> 
          <span class="field-name">id</span>
        </div>
        <div class="panel-meta">共 25 值</div>
      </div>

      <!-- Panel Body：白底和白卡片的海洋，高度固定内部滚动 -->
      <div class="panel-body">
        <div class="tag-item">id_001</div>
        <div class="tag-item">id_002</div>
        <div class="tag-item">id_003</div>
        <div class="tag-item">id_004</div>
        <div class="tag-item">admin_uid</div>
        <div class="tag-item">system_id</div>
        <div class="tag-item">test_01</div>
        <div class="tag-item">test_02</div>
        <div class="tag-item">short_id</div>
        <div class="tag-item">very_long_string_identifier_2023_version_1</div>
        <div class="tag-item">id_008</div>
        <div class="tag-item">id_009</div>
        <div class="tag-item">id_010</div>
        <div class="tag-item">id_011</div>
        <div class="tag-item">id_012</div>
        <div class="tag-item">id_013</div>
        <div class="tag-item">id_014</div>
        <div class="tag-item">id_015</div>
        <div class="tag-item">id_016</div>
        <div class="tag-item">test_user_abcd1234</div>
        <div class="tag-item">test_user_abcd1235</div>
        <!-- 空值隔离感 -->
        <div class="tag-item empty-value">(空字符串)</div>
        <div class="tag-item empty-value">(NULL)</div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
